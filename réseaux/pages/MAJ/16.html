<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>v1.1 - Synthèse Réseaux</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <div class="nav-droite">
    <div class="nav-bouton" id="theme-btn" onclick="toggleTheme()">🌙</div>
  </div>

  <script>
    if (localStorage.getItem('dark') === 'on') {
      document.body.classList.add('dark');
      document.getElementById('theme-btn').textContent = '☀️';
    }
    function toggleTheme() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('dark', isDark ? 'on' : 'off');
      document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
    }
  </script>

  <div class="page">
    <h1>v1.1</h1>
    <nav class="nav-back">
      <a href="../../index.html">← Retour Synthèse</a>
    </nav>
    <div class="content-zone">

      <!-- Ex: <div class="zone-centre">Texte centré</div> -->
      <!-- Ex: <div class="texte-long">Texte long</div> -->
      <!-- Ex: <h2>Titre</h2><table class="table">...</table> -->
      <!-- Ex: <div class="zone-attention">Attention !</div> -->

    </div>
  </div>

</body>
</html>
