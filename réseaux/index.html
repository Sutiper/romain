<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Synthèse Réseaux</title>
  <link rel="stylesheet" href="pages/style.css">
</head>
<body>

  <div class="nav-droite">
    <div class="nav-bouton" id="theme-btn" onclick="toggleTheme()">🌙</div>
  </div>

  <script>
    if (localStorage.getItem('dark') === 'on') {
      document.body.classList.add('dark');
      document.getElementById('theme-btn').textContent = '☀️';
    }
    function toggleTheme() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('dark', isDark ? 'on' : 'off');
      document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
    }
  </script>

  <div class="page">
    <h1>Synthèse Réseaux v1.1</h1>
    <div class="texte-accueil">
      Synthèse des configurations switchs et routeurs Cisco.<br>
      Clique sur un bouton pour accéder à la documentation.
    </div>
    <div class="row">
      <a href="pages/cdb.html" class="bouton">CONFIGURATION DE BASE</a>
    </div>
    <div class="row">
      <a href="pages/crs.html" class="bouton">ROUTAGE</a>
      <a href="pages/acl.html" class="bouton">CONFIGURATION DE ACL</a>
    </div>
    <div class="row">
      <a href="pages/tai.html" class="bouton">TRANSLATION D'ADRESSES IP</a>
      <a href="pages/rscdhcp.html" class="bouton">ROUTEUR DHCP</a>
    </div>
    <div class="row">
      <a href="pages/dmz.html" class="bouton">DMZ</a>
    </div>
    <div class="row">
      <a href="pages/modele.html" class="bouton">MODELE PAGE</a>
      <a href="pages/prefabriquee.html" class="bouton">MP</a>
      <a href="pages/maj.html" class="bouton">MISE A JOUR</a>
    </div>
  </div>

</body>
</html>
