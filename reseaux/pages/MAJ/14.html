<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>v1.1 - Synthèse Réseaux</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="nav-droite">
    <div class="nav-bouton" onclick="toggleThemeMenu()">🎨</div>
    <div id="theme-menu" class="theme-menu">
      <div class="theme-option" onclick="setTheme('')">base</div>
      <div class="theme-option" onclick="setTheme('theme-bleu')">sobre et élégant</div>
      <div class="theme-option" onclick="setTheme('theme-vert')">Vert</div>
      <div class="theme-option" onclick="setTheme('theme-sombre')">Sombre</div>
    </div>
  </div>
  </div><div class="page">
    <h1>v1.1</h1>
    <nav class="nav-back">
      <a href="../../index.html">← Retour Synthèse</a>
    </nav>
    <div class="content-zone">

      <!-- Ex: <div class="zone-centre">Texte centré</div> -->
      <!-- Ex: <div class="texte-long">Texte long</div> -->
      <!-- Ex: <h2>Titre</h2><table class="table">...</table> -->
      <!-- Ex: <div class="zone-attention">Attention !</div> -->

    </div>
  </div>

  <script>
function setTheme(theme) {
  document.body.className = theme;
  localStorage.setItem('theme', theme);
  var m = document.getElementById('theme-menu');
  if (m) m.classList.remove('open');
}
function toggleThemeMenu() {
  var m = document.getElementById('theme-menu');
  if (m) m.classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.nav-droite')) {
    var m = document.getElementById('theme-menu');
    if (m) m.classList.remove('open');
  }
});
window.addEventListener('load', function() {
  var savedTheme = localStorage.getItem('theme');
  if (savedTheme !== null) document.body.className = savedTheme;
});
  </script>
</body>
</html>
