<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>v1.1 - Synthèse Réseaux</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <div class="nav-droite">
    <div class="nav-bouton" id="theme-btn" onclick="toggleTheme()">🌙</div>
  </div>

  <script>
    if (localStorage.getItem('dark') === 'on') {
      document.body.classList.add('dark');
      document.getElementById('theme-btn').textContent = '☀️';
    }
    function toggleTheme() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('dark', isDark ? 'on' : 'off');
      document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
    }
  </script>

  <div class="page">
    <h1>v1.1</h1>
    <nav class="nav-back">
      <a href="../../index.html">← Retour Synthèse</a>
    </nav>
    <div class="content-zone">

      <!-- TEXTE PRINCIPAL -->
      <div class="texte-long">
        <p>- ajout de quelques details<br>
        - ajout de configuration dynamique<br>
        - amelioration de l'usage général<br>
        - ajout de bouton télécharger<br>
        - ajout d'une calculatrice<br>
        - ajout de cookies <br>
        - ajout de fond <br>
        </p>
      </div>

    </div>
  </div>

</body>
</html>
